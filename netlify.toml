[build]
  publish = "."

# Long cache for fingerprint-free static assets. Images and the stylesheet
# rarely change; the HTML is always revalidated.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
